{% extends "base.html" %}
{% block content %}
  <h1>Delete Task</h1>
  <p>Are you sure you want to delete the task: {{ task.name }}</p>
  <p><i>All information about the task will be lost!</i></p>
  <form action="" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Yes, delete" class="btn btn-danger"/>
  </form>
{% endblock %}
