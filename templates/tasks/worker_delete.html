{% extends "base.html" %}
{% block content %}
  <h1>Delete Employee</h1>
  <p>Are you sure you want to delete this employee: <strong>{{ worker.first_name }} {{ worker.last_name }}</strong>?</p>
  <p><em>All information about this employee will be lost!</em></p>
  <form action="" method="post" class="mb-3">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Yes, delete" class="btn btn-danger">
  </form>
{% endblock %}
