{% extends "base.html" %}
{% block content %}
  <h1>Delete Team</h1>
  <p>Are you sure you want to delete this team: <strong>{{ team.name }}</strong>?</p>
  <p><em>All information about this team will be lost!</em></p>
  <form action="" method="post" class="mb-3">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Yes, delete" class="btn btn-danger">
  </form>
{% endblock %}
